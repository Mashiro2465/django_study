
{% extends 'todo/base.html' %}
{% block content %}

    <h1>({{ request.user.username }})의 ToDo List Page</h1>


    <div>
        {% if request.user.is_authenticated %}


            <button onclick="location.href='{% url 'todo:cbv_todo_create' %}'">생성하기</button>


            <ul>
                {% for todo in page_obj %}
                    <li>
                        <a href="{% url 'todo:cbv_todo_info' todo.id %}">
                            {{ todo.title }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
            {% include 'todo/pagination.html' %}


        {% else %}
            <h1>로그인을 해주세요</h1>
        {% endif %}
    </div>

{% endblock %}
