<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>ToDo List Page</h1>

    <nav style="text-align: right">
         {% if request.user.is_authenticated %}
            <div>
                {{ request.user.username }}
                <form action="{% url 'logout' %}" method="POST">
                    {% csrf_token %}
                    <button>Logout</button>
                </form>
            </div>
        {% else %}
            <div>
                <a href="{% url 'signup' %}">회원가입</a>
                <a href="{% url 'login' %}">로그인</a>
            </div>
        {% endif %}

    </nav>
    <div>
        {% if request.user.is_authenticated %}
        <ul>
            {% for todo in todos %}
                <li>
                    <a href="/todo/{{ todo.id }}">
                        {{ todo.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>

        {% else %}
            <h1>로그인을 해주세요</h1>
        {% endif %}
    </div>

</body>
</html>
